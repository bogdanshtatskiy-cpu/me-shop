<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЭ Магазин | Админ-Панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased min-h-screen flex flex-col">

    <div id="login-screen" class="flex flex-1 items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
            <h2 class="text-3xl font-bold text-center text-blue-400 mb-6">Вход в систему</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400">Email</label>
                    <input type="email" id="email" required class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400">Пароль</label>
                    <input type="password" id="password" required class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden">Неверный логин или пароль.</div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none">
                    Войти
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-1 flex flex-col">
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <span class="text-xl font-bold text-blue-400">МЭ Магазин</span>
                        <div class="hidden sm:block ml-10 flex items-baseline space-x-4">
                            <button onclick="switchTab('users')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium bg-gray-900 text-white" id="tab-users">Игроки</button>
                            <button onclick="switchTab('shop')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-shop">Товары</button>
                            <button onclick="switchTab('logs')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-logs">Логи</button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="user-email" class="text-sm text-gray-400"></span>
                        <button onclick="logout()" class="px-3 py-2 rounded-md text-sm font-medium text-white bg-red-600 hover:bg-red-700">Выйти</button>
                    </div>
                </div>
                <div class="sm:hidden pb-3 flex space-x-2 overflow-x-auto">
                    <button onclick="switchTab('users')" class="tab-btn flex-none px-3 py-2 rounded-md text-sm font-medium bg-gray-900 text-white" id="tab-users-mob">Игроки</button>
                    <button onclick="switchTab('shop')" class="tab-btn flex-none px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-shop-mob">Товары</button>
                    <button onclick="switchTab('logs')" class="tab-btn flex-none px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-logs-mob">Логи</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            <div id="content-users" class="tab-content block">
                <h2 class="text-2xl font-bold mb-4">Управление балансом</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Никнейм</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Баланс (ЭМ)</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Сохранить</th>
                            </tr>
                        </thead>
                        <tbody id="users-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <div id="content-shop" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">Товары на витрине</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Название</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Категория</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Цена</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="shop-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <div id="content-logs" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">История операций</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase whitespace-nowrap">Время</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Игрок</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase">Действие</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase min-w-[200px]">Детали</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Конфигурация, которую ты предоставил
        const firebaseConfig = {
            apiKey: "AIzaSyD3JArVjGMjAhld1IvGnsEdT4cJqpyK0ok",
            authDomain: "me-shop-db-f7542.firebaseapp.com",
            databaseURL: "https://me-shop-db-f7542-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "me-shop-db-f7542",
            storageBucket: "me-shop-db-f7542.firebasestorage.app",
            messagingSenderId: "258368560679",
            appId: "1:258368560679:web:ab64e53192d07835a9b802"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Управление видимостью экранов на основе статуса авторизации
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                loadData(); // Загружаем данные только после успешного входа
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        // Вход в систему
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    document.getElementById('login-error').classList.remove('hidden');
                });
        });

        // Выход
        function logout() {
            auth.signOut();
        }

        // Управление вкладками
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-gray-900', 'text-white');
                el.classList.add('text-gray-300');
            });
            
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('bg-gray-900', 'text-white');
            if(document.getElementById('tab-' + tabId + '-mob')) {
                document.getElementById('tab-' + tabId + '-mob').classList.add('bg-gray-900', 'text-white');
            }
        }

        // Загрузка данных из БД
        function loadData() {
            // Балансы пользователей
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const tbody = document.getElementById('users-table');
                tbody.innerHTML = '';
                for (const [name, data] of Object.entries(users)) {
                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-white">${name}</td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="number" id="bal-${name}" value="${data.balance}" class="bg-gray-700 text-white px-2 py-1 rounded border border-gray-600 w-24">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <button onclick="saveBalance('${name}')" class="text-green-400 hover:text-green-300 font-bold">✔</button>
                            </td>
                        </tr>
                    `;
                }
            });

            // Товары магазина
            db.ref('shop/items').on('value', (snapshot) => {
                const items = snapshot.val() || [];
                const tbody = document.getElementById('shop-table');
                tbody.innerHTML = '';
                items.forEach((item, index) => {
                    if(!item) return;
                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="text" id="name-${index}" value="${item.name}" class="bg-gray-700 text-white px-2 py-1 rounded border border-gray-600 w-full md:w-48">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="text" id="cat-${index}" value="${item.category}" class="bg-gray-700 text-white px-2 py-1 rounded border border-gray-600 w-24 md:w-32">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="number" id="price-${index}" value="${item.price}" class="bg-gray-700 text-white px-2 py-1 rounded border border-gray-600 w-20">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <button onclick="saveItem(${index})" class="text-blue-400 hover:text-blue-300 font-bold">✔</button>
                            </td>
                        </tr>
                    `;
                });
            });

            // Логи (последние 50)
            db.ref('logs').orderByKey().limitToLast(50).on('value', (snapshot) => {
                const logsRaw = snapshot.val() || {};
                const tbody = document.getElementById('logs-table');
                tbody.innerHTML = '';
                const logs = Object.values(logsRaw).reverse();
                
                logs.forEach(log => {
                    let actionColor = "text-gray-300";
                    if(log.action.includes("ПОКУПКА")) actionColor = "text-green-400";
                    if(log.action.includes("ПРОДАЖА") || log.action.includes("СКУПКА")) actionColor = "text-yellow-400";
                    if(log.action.includes("УДАЛЕН") || log.action.includes("ОШИБКА")) actionColor = "text-red-400";

                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 whitespace-nowrap text-xs text-gray-400">${log.time}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-white">${log.user}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-bold ${actionColor}">${log.action}</td>
                            <td class="px-4 py-3 text-sm text-gray-300 min-w-[200px] break-words">${log.details}</td>
                        </tr>
                    `;
                });
            });
        }

        // Функции сохранения в БД
        window.saveBalance = function(name) {
            const newBal = document.getElementById(`bal-${name}`).value;
            db.ref(`users/${name}/balance`).set(Number(newBal))
              .then(() => alert('Баланс обновлен!'))
              .catch(e => alert('Ошибка доступа!'));
        }

        window.saveItem = function(index) {
            const name = document.getElementById(`name-${index}`).value;
            const cat = document.getElementById(`cat-${index}`).value;
            const price = document.getElementById(`price-${index}`).value;
            db.ref(`shop/items/${index}`).update({ name: name, category: cat, price: Number(price) })
              .then(() => alert('Товар обновлен!'))
              .catch(e => alert('Ошибка доступа!'));
        }
    </script>
</body>
</html>
