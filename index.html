<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЭ Магазин | Админ-Панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased min-h-screen flex flex-col">

    <div id="login-screen" class="flex flex-1 items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
            <h2 class="text-3xl font-bold text-center text-blue-400 mb-6">Вход в систему</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400">Email</label>
                    <input type="email" id="email" required class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400">Пароль</label>
                    <input type="password" id="password" required class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-2 px-3 text-white focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden">Неверный логин или пароль.</div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition">
                    Войти
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-1 flex flex-col">
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <span class="text-xl font-bold text-blue-400">МЭ Магазин</span>
                        <div class="hidden sm:flex ml-10 items-baseline space-x-4">
                            <button onclick="switchTab('users')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium bg-gray-900 text-white" id="tab-users">Игроки</button>
                            <button onclick="switchTab('shop')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-shop">Товары</button>
                            <button onclick="switchTab('logs')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-logs">Логи</button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="user-email" class="text-sm text-gray-400 hidden sm:block"></span>
                        <button onclick="logout()" class="px-4 py-2 rounded-md text-sm font-medium text-white bg-red-600 hover:bg-red-700 transition">Выйти</button>
                    </div>
                </div>
                <div class="sm:hidden pb-3 flex space-x-2 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('users')" class="tab-btn flex-none px-4 py-2 rounded-md text-sm font-medium bg-gray-900 text-white" id="tab-users-mob">Игроки</button>
                    <button onclick="switchTab('shop')" class="tab-btn flex-none px-4 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-shop-mob">Товары</button>
                    <button onclick="switchTab('logs')" class="tab-btn flex-none px-4 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white" id="tab-logs-mob">Логи</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
            
            <div id="content-users" class="tab-content block">
                <h2 class="text-2xl font-bold mb-4">Управление балансом</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Никнейм</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Баланс (ЭМ)</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="users-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <div id="content-shop" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">Товары на витрине</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Название</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Категория</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Цена</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="shop-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <div id="content-logs" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">История операций</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Время</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Игрок</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Действие</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider min-w-[200px]">Детали</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3JArVjGMjAhld1IvGnsEdT4cJqpyK0ok",
            authDomain: "me-shop-db-f7542.firebaseapp.com",
            databaseURL: "https://me-shop-db-f7542-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "me-shop-db-f7542",
            storageBucket: "me-shop-db-f7542.firebasestorage.app",
            messagingSenderId: "258368560679",
            appId: "1:258368560679:web:ab64e53192d07835a9b802"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                loadData(); 
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, password).catch(() => {
                document.getElementById('login-error').classList.remove('hidden');
            });
        });

        function logout() { auth.signOut(); }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-gray-900', 'text-white');
                el.classList.add('text-gray-300');
            });
            
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('bg-gray-900', 'text-white');
            if(document.getElementById('tab-' + tabId + '-mob')) {
                document.getElementById('tab-' + tabId + '-mob').classList.add('bg-gray-900', 'text-white');
            }
        }

        function loadData() {
            // ПОЛЬЗОВАТЕЛИ
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const tbody = document.getElementById('users-table');
                tbody.innerHTML = '';
                
                for (const [name, rawData] of Object.entries(users)) {
                    let data = rawData;
                    if (typeof rawData === 'string') { try { data = JSON.parse(rawData); } catch(e) { data = { balance: 0 }; } }
                    const balance = data.balance !== undefined ? data.balance : 0;
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-white">${name}</td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="number" id="bal-${name}" value="${balance}" class="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 w-28 focus:outline-none focus:border-blue-500">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <button onclick="saveBalance('${name}')" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded transition">СОХРАНИТЬ</button>
                            </td>
                        </tr>
                    `;
                }
            });

            // ТОВАРЫ
            db.ref('shop').on('value', (snapshot) => {
                let shopData = snapshot.val() || {};
                if (typeof shopData === 'string') { try { shopData = JSON.parse(shopData); } catch(e) { shopData = {}; } }
                
                const itemsRaw = shopData.items || [];
                const tbody = document.getElementById('shop-table');
                tbody.innerHTML = '';
                
                Object.keys(itemsRaw).forEach(key => {
                    const item = itemsRaw[key];
                    if(!item) return;
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="text" id="name-${key}" value="${item.name}" class="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 w-full min-w-[140px] focus:outline-none focus:border-blue-500">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="text" id="cat-${key}" value="${item.category}" class="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 w-full min-w-[100px] focus:outline-none focus:border-blue-500">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <input type="number" id="price-${key}" value="${item.price}" class="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 w-24 focus:outline-none focus:border-blue-500">
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <button onclick="saveItem('${key}')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition">СОХРАНИТЬ</button>
                            </td>
                        </tr>
                    `;
                });
            });

            // ЛОГИ
            db.ref('logs').orderByKey().limitToLast(50).on('value', (snapshot) => {
                const logsRaw = snapshot.val() || {};
                const tbody = document.getElementById('logs-table');
                tbody.innerHTML = '';
                
                const logsArray = [];
                for (const key in logsRaw) {
                    let log = logsRaw[key];
                    if (typeof log === 'string') { try { log = JSON.parse(log); } catch(e) { continue; } }
                    logsArray.push(log);
                }
                logsArray.reverse(); // Сортируем от новых к старым
                
                logsArray.forEach(log => {
                    let actionColor = "text-gray-300";
                    if(log.action.includes("ПОКУПКА")) actionColor = "text-green-400";
                    if(log.action.includes("ПРОДАЖА") || log.action.includes("СКУПКА")) actionColor = "text-yellow-400";
                    if(log.action.includes("УДАЛЕН") || log.action.includes("ОШИБКА")) actionColor = "text-red-400";

                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 whitespace-nowrap text-xs text-gray-400">${log.time}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-white">${log.user}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm font-bold ${actionColor}">${log.action}</td>
                            <td class="px-4 py-3 text-sm text-gray-300 min-w-[200px] max-w-sm break-words whitespace-normal">${log.details}</td>
                        </tr>
                    `;
                });
            });
        }

        window.saveBalance = function(name) {
            const newBal = document.getElementById(`bal-${name}`).value;
            db.ref(`users/${name}/balance`).set(Number(newBal))
              .then(() => showToast('Баланс успешно обновлен', 'success'))
              .catch(e => showToast('Ошибка сохранения', 'error'));
        }

        window.saveItem = function(key) {
            const name = document.getElementById(`name-${key}`).value;
            const cat = document.getElementById(`cat-${key}`).value;
            const price = document.getElementById(`price-${key}`).value;
            
            db.ref('shop').once('value').then((snapshot) => {
                let shopData = snapshot.val() || {};
                if (typeof shopData === 'string') {
                    try { shopData = JSON.parse(shopData); } catch(e) { shopData = { items: [] }; }
                }
                if (shopData.items && shopData.items[key]) {
                    shopData.items[key].name = name;
                    shopData.items[key].category = cat;
                    shopData.items[key].price = Number(price);
                    db.ref('shop').set(shopData)
                      .then(() => showToast('Товар успешно обновлен', 'success'))
                      .catch(e => showToast('Ошибка сохранения', 'error'));
                }
            });
        }

        // Красивые уведомления вместо alert()
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded shadow-lg text-white font-medium transition-opacity duration-300 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
