<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Казино | Админ-Панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        input { transition: background-color 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased min-h-screen flex flex-col">

    <div id="login-screen" class="flex flex-1 items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md border border-gray-700">
            <h2 class="text-3xl font-bold text-center text-purple-400 mb-6">Вход в систему Казино</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400">Никнейм</label>
                    <input type="text" id="email" required class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400">Пароль</label>
                    <input type="password" id="password" required class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden text-center">Неверный логин или пароль.</div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none transition">
                    Войти
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-1 flex flex-col">
        <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <span class="text-xl font-bold text-purple-400 mr-4">Казино</span>
                        <div class="hidden sm:flex space-x-2">
                            <button onclick="switchTab('users')" class="tab-btn px-4 py-2 rounded-md text-sm font-medium bg-gray-900 text-white" id="tab-users">Игроки</button>
                            <button onclick="switchTab('cases')" class="tab-btn px-4 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition" id="tab-cases">Кейсы</button>
                            <button onclick="switchTab('logs')" class="tab-btn px-4 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition" id="tab-logs">Логи</button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="user-email" class="text-sm text-gray-400 hidden md:block"></span>
                        <button onclick="logout()" class="px-4 py-2 rounded-md text-sm font-medium text-white bg-red-600 hover:bg-red-700 transition">Выход</button>
                    </div>
                </div>
                 <div class="sm:hidden pb-3 pt-1 flex space-x-2 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('users')" class="tab-btn flex-none px-4 py-2 rounded-md text-sm font-medium bg-gray-900 text-white" id="tab-users-mob">Игроки</button>
                    <button onclick="switchTab('cases')" class="tab-btn flex-none px-4 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition" id="tab-cases-mob">Кейсы</button>
                    <button onclick="switchTab('logs')" class="tab-btn flex-none px-4 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition" id="tab-logs-mob">Логи</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
            
            <div id="content-users" class="tab-content block">
                <h2 class="text-2xl font-bold mb-4">Управление игроками</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-hidden border border-gray-700">
                    <div class="hidden sm:flex bg-gray-700 p-4 text-xs font-medium text-gray-300 uppercase tracking-wider">
                        <div class="flex-1">Никнейм</div>
                        <div class="w-48 text-center">Баланс</div>
                    </div>
                    <div id="users-list" class="divide-y divide-gray-700"></div>
                </div>
            </div>

            <div id="content-cases" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">Управление кейсами</h2>
                <div id="cases-list" class="space-y-6"></div>
            </div>

            <div id="content-logs" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">История операций</h2>
                <div class="bg-gray-800 shadow rounded-lg overflow-hidden border border-gray-700">
                    <div id="logs-list" class="divide-y divide-gray-700 max-h-[75vh] overflow-y-auto"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="./firebase-config.js"></script>
    
    <script>
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const DB_PATH = 'casino';

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email.replace('@casino.local', '');
                loadData(); 
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            let email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email.includes('@')) email = email + '@casino.local';
            auth.signInWithEmailAndPassword(email, password).catch(() => {
                document.getElementById('login-error').classList.remove('hidden');
            });
        });

        function logout() { auth.signOut(); }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-gray-900', 'text-white');
                el.classList.add('text-gray-300');
            });
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('bg-gray-900', 'text-white');
            if(document.getElementById('tab-' + tabId + '-mob')) {
                document.getElementById('tab-' + tabId + '-mob').classList.add('bg-gray-900', 'text-white');
            }
        }
        
        function getRarityColor(chance) {
            if (chance < 5) return 'border-yellow-400';
            if (chance < 20) return 'border-purple-400';
            if (chance < 60) return 'border-blue-400';
            if (chance < 80) return 'border-green-400';
            return 'border-gray-500';
        }

        function loadData() {
            // ИГРОКИ
            db.ref(`${DB_PATH}/users`).on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const list = document.getElementById('users-list');
                list.innerHTML = '';
                for (const [name, rawData] of Object.entries(users)) {
                    let data = rawData;
                    if (typeof rawData === 'string') { try { data = JSON.parse(rawData); } catch(e) { data = { balance: 0 }; } }
                    const balance = data.balance !== undefined ? data.balance : 0;
                    list.innerHTML += `
                        <div class="p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:bg-gray-750 transition">
                            <div class="font-bold text-lg sm:text-base text-white">${name}</div>
                            <div class="flex items-center gap-3">
                                <div class="flex-1 sm:flex-none">
                                    <label class="text-xs text-gray-400 block sm:hidden mb-1">Баланс</label>
                                    <input type="number" id="bal-${name}" value="${balance}" class="w-full sm:w-28 bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-purple-500">
                                </div>
                                <div class="pt-5 sm:pt-0">
                                    <button onclick="saveBalance('${name}')" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded transition w-full sm:w-auto">Сохранить</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            // КЕЙСЫ
            db.ref(`${DB_PATH}/data/cases`).on('value', (snapshot) => {
                let cases = snapshot.val() || [];
                const list = document.getElementById('cases-list');
                list.innerHTML = '';
                cases.forEach((caseData, caseIndex) => {
                    if (!caseData) return;
                    
                    // Расчет матожидания прибыли
                    let totalChance = 0;
                    let evSum = 0;
                    const items = caseData.items || [];
                    items.forEach((item) => {
                        let ch = Number(item.chance) || 0;
                        let pr = Number(item.price) || 0;
                        totalChance += ch;
                        evSum += (pr * ch);
                    });
                    const expectedValue = totalChance > 0 ? (evSum / totalChance) : 0;
                    const profitPerOpen = Number(caseData.price) - expectedValue;
                    const profitColor = profitPerOpen >= 0 ? 'text-green-400' : 'text-red-400';
                    const profitSign = profitPerOpen > 0 ? '+' : '';

                    let itemsHtml = '';
                    items.forEach((item, itemIndex) => {
                         itemsHtml += `
                            <div class="p-3 bg-gray-800 rounded-md border-l-4 ${getRarityColor(item.chance)}">
                                <div class="flex flex-col md:flex-row md:items-center gap-4">
                                    <div class="flex-1">
                                        <label class="text-xs text-gray-400 block mb-1">Название</label>
                                        <input type="text" id="name-${caseIndex}-${itemIndex}" value="${item.name}" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-purple-500">
                                    </div>
                                    <div class="w-full md:w-32">
                                        <label class="text-xs text-gray-400 block mb-1">Цена предмета</label>
                                        <input type="number" id="price-${caseIndex}-${itemIndex}" value="${item.price}" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-purple-500">
                                    </div>
                                    <div class="w-full md:w-24">
                                        <label class="text-xs text-gray-400 block mb-1">Шанс (%)</label>
                                        <input type="number" step="0.001" id="chance-${caseIndex}-${itemIndex}" value="${item.chance}" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-purple-500">
                                    </div>
                                </div>
                            </div>
                         `;
                    });

                    list.innerHTML += `
                        <div class="bg-gray-800 shadow-xl rounded-lg p-5 border border-gray-700">
                            <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-4 pb-4 border-b border-gray-700">
                                <div class="flex-1">
                                    <label class="text-xs text-gray-400 uppercase tracking-wide">Название кейса</label>
                                    <input type="text" id="case-name-${caseIndex}" value="${caseData.name}" class="mt-1 w-full bg-gray-700 text-white text-xl font-bold px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-purple-500">
                                    <div class="mt-2 text-sm font-mono bg-gray-900 inline-block px-3 py-1 rounded shadow-inner ${profitColor}">
                                        💰 Ожидаемая прибыль казино: <b>${profitSign}${profitPerOpen.toFixed(2)} ЭМ</b> с 1 открытия
                                    </div>
                                </div>
                                <div class="w-full sm:w-32">
                                     <label class="text-xs text-gray-400 uppercase tracking-wide">Цена открытия</label>
                                     <input type="number" id="case-price-${caseIndex}" value="${caseData.price}" class="mt-1 w-full bg-gray-700 text-yellow-400 text-xl font-bold px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-yellow-500">
                                </div>
                                <div class="pt-6">
                                     <button onclick="saveCase(${caseIndex})" class="w-full sm:w-auto bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-6 rounded transition shadow-lg">Сохранить кейс</button>
                                </div>
                            </div>

                            <h3 class="text-lg font-semibold mb-3 text-gray-300">Содержимое:</h3>
                            <div class="space-y-3 mb-6">${itemsHtml}</div>

                            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                
                                <div class="bg-gray-900 p-5 rounded-lg border border-gray-700 relative">
                                    <h4 class="font-semibold mb-3 text-blue-400 text-lg">Симулятор открытий (1000 раз)</h4>
                                    <button onclick="runSimulation(${caseIndex})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition shadow mb-4">Запустить тест</button>
                                    <div id="sim-result-${caseIndex}" class="min-h-[100px]">
                                        <p class="text-gray-500 text-sm text-center pt-6">Нажмите кнопку для запуска симуляции</p>
                                    </div>
                                    <div class="mt-4">
                                        <canvas id="chart-${caseIndex}" class="max-h-48"></canvas>
                                    </div>
                                </div>

                                <div class="bg-gray-900 p-5 rounded-lg border border-gray-700">
                                    <h4 class="font-semibold mb-2 text-yellow-400 text-lg">Умный советник балансировки</h4>
                                    <p class="text-sm text-gray-400 mb-4 leading-relaxed">Введите желаемую чистую прибыль казино за 1000 открытий. Алгоритм идеально подберет шансы предметов, чтобы вывести вас в этот плюс.</p>
                                    
                                    <div class="flex items-center gap-3 mb-4 bg-gray-800 p-3 rounded">
                                        <label class="text-sm font-medium text-gray-300 w-32">Цель (прибыль):</label>
                                        <input type="number" id="target-profit-${caseIndex}" placeholder="Напр: 1500" value="1500" class="flex-1 bg-gray-700 text-yellow-400 font-bold px-3 py-2 rounded border border-gray-600 focus:outline-none focus:border-yellow-500">
                                        <button onclick="adviseChances(${caseIndex})" class="bg-yellow-600 hover:bg-yellow-700 text-white font-medium py-2 px-4 rounded transition shadow">Рассчитать</button>
                                    </div>
                                    <div id="advice-result-${caseIndex}"></div>
                                </div>

                            </div>
                        </div>
                    `;
                });
            });

            // ЛОГИ
            db.ref(`${DB_PATH}/logs`).orderByKey().limitToLast(200).on('value', (snapshot) => {
                const logsRaw = snapshot.val() || {};
                const list = document.getElementById('logs-list');
                list.innerHTML = '';
                const logsArray = [];
                for (const key in logsRaw) { logsArray.push(logsRaw[key]); }
                logsArray.reverse(); 
                logsArray.forEach(log => {
                    let actionColor = "text-gray-300";
                    if(log.action.includes("ВЫИГРЫШ")) actionColor = "text-green-400";
                    if(log.action.includes("ПОПОЛНЕНИЕ")) actionColor = "text-yellow-400";
                    if(log.action.includes("ОШИБКА")) actionColor = "text-red-400";

                    list.innerHTML += `
                        <div class="p-4 hover:bg-gray-750 transition flex flex-col gap-1 border-b border-gray-800">
                            <div class="flex flex-wrap justify-between items-center gap-x-4 gap-y-1">
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-base text-white">${log.user}</span>
                                    <span class="text-sm font-bold bg-gray-900 px-2 py-0.5 rounded ${actionColor}">${log.action}</span>
                                </div>
                                <span class="text-xs font-mono text-gray-400">${log.time}</span>
                            </div>
                            <div class="text-sm text-gray-300 break-words mt-1">${log.details}</div>
                        </div>
                    `;
                });
            });
        }

        window.saveBalance = function(name) {
            const newBal = document.getElementById(`bal-${name}`).value;
            db.ref(`${DB_PATH}/users/${name}/balance`).set(Number(newBal))
              .then(() => showToast('Баланс обновлен', 'success'))
              .catch(e => showToast('Ошибка сохранения', 'error'));
        }

        window.saveCase = function(caseIndex) {
            db.ref(`${DB_PATH}/data/cases/${caseIndex}`).once('value').then(snapshot => {
                const caseData = snapshot.val();
                if (!caseData) { showToast('Кейс не найден', 'error'); return; }

                caseData.name = document.getElementById(`case-name-${caseIndex}`).value;
                caseData.price = Number(document.getElementById(`case-price-${caseIndex}`).value);

                const items = caseData.items || [];
                items.forEach((item, itemIndex) => {
                    item.name = document.getElementById(`name-${caseIndex}-${itemIndex}`).value;
                    item.price = Number(document.getElementById(`price-${caseIndex}-${itemIndex}`).value);
                    item.chance = Number(document.getElementById(`chance-${caseIndex}-${itemIndex}`).value);
                });
                
                db.ref(`${DB_PATH}/data/cases/${caseIndex}`).set(caseData)
                  .then(() => showToast('Кейс успешно сохранен', 'success'))
                  .catch(e => showToast('Ошибка сохранения', 'error'));
            });
        }
        
        // ОБНОВЛЕННЫЙ СИМУЛЯТОР ПО ПРЕДМЕТАМ
        window.runSimulation = function(caseIndex) {
            const casePrice = Number(document.getElementById(`case-price-${caseIndex}`).value);
            const items = [];
            let i = 0;
            while(document.getElementById(`name-${caseIndex}-${i}`)) {
                items.push({
                    name: document.getElementById(`name-${caseIndex}-${i}`).value,
                    price: Number(document.getElementById(`price-${caseIndex}-${i}`).value),
                    chance: Number(document.getElementById(`chance-${caseIndex}-${i}`).value)
                });
                i++;
            }
            
            let totalChance = items.reduce((sum, it) => sum + it.chance, 0);
            
            const numSimulations = 1000;
            let totalSpentByUser = casePrice * numSimulations;
            let totalGivenByCasino = 0;
            
            let itemStats = {};
            items.forEach(it => itemStats[it.name] = { count: 0, val: 0, color: getRarityColor(it.chance) });

            // Крутим рулетку 1000 раз
            for (let j = 0; j < numSimulations; j++) {
                const randomNum = Math.random() * totalChance;
                let cumulative = 0;
                for (const item of items) {
                    cumulative += item.chance;
                    if (randomNum <= cumulative) {
                        totalGivenByCasino += item.price;
                        itemStats[item.name].count++;
                        itemStats[item.name].val += item.price;
                        break;
                    }
                }
            }

            const casinoProfit = totalSpentByUser - totalGivenByCasino; 
            const casinoROI = (casinoProfit / totalSpentByUser) * 100;
            
            let statHtml = `
                <div class="grid grid-cols-2 gap-2 text-xs mb-3 font-mono">
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">Внесено игроками:<br><b class="text-white text-sm">${totalSpentByUser.toFixed(0)} ЭМ</b></div>
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">Выдано призами:<br><b class="text-white text-sm">${totalGivenByCasino.toFixed(0)} ЭМ</b></div>
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">Чистая прибыль:<br><b class="text-sm ${casinoProfit >= 0 ? 'text-green-400' : 'text-red-400'}">${casinoProfit > 0 ? '+' : ''}${casinoProfit.toFixed(0)} ЭМ</b></div>
                    <div class="bg-gray-800 p-2 rounded border border-gray-700">ROI (Маржа):<br><b class="text-sm ${casinoROI >= 0 ? 'text-green-400' : 'text-red-400'}">${casinoROI > 0 ? '+' : ''}${casinoROI.toFixed(2)}%</b></div>
                </div>
                <div class="max-h-40 overflow-y-auto pr-2 custom-scrollbar bg-gray-800 rounded p-2 border border-gray-700">
                    <table class="w-full text-left text-xs">
                        <thead><tr class="text-gray-400 border-b border-gray-600"><th class="pb-1">Предмет</th><th class="pb-1 text-center">Выпал</th><th class="pb-1 text-right">На сумму</th></tr></thead>
                        <tbody class="divide-y divide-gray-700">
            `;
            
            // Сортируем вывод по убыванию выпадений
            let sortedItems = Object.keys(itemStats).sort((a,b) => itemStats[b].count - itemStats[a].count);
            for(let name of sortedItems) {
                let stat = itemStats[name];
                if(stat.count > 0) {
                    statHtml += `<tr><td class="py-1.5">${name}</td><td class="py-1.5 text-center font-bold">${stat.count} раз</td><td class="py-1.5 text-right text-yellow-400 font-mono">${stat.val} ЭМ</td></tr>`;
                }
            }
            statHtml += `</tbody></table></div>`;
            document.getElementById(`sim-result-${caseIndex}`).innerHTML = statHtml;
            
            // График по именам
            const chartCtx = document.getElementById(`chart-${caseIndex}`).getContext('2d');
            if(window.charts && window.charts[caseIndex]) window.charts[caseIndex].destroy();
            if(!window.charts) window.charts = {};
            
            window.charts[caseIndex] = new Chart(chartCtx, {
                type: 'bar',
                data: {
                    labels: sortedItems.map(n => n.length > 10 ? n.substring(0,8)+'...' : n),
                    datasets: [{
                        label: 'Кол-во выпадений',
                        data: sortedItems.map(n => itemStats[n].count),
                        backgroundColor: '#60a5fa',
                        borderRadius: 4
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true, grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }, x: { grid: { display: false }, ticks: { color: '#9ca3af', font: {size: 10} } } },
                    plugins: { legend: { display: false } },
                    maintainAspectRatio: false
                }
            });
        }

        // АЛГОРИТМ СОВЕТНИКА БАЛАНСИРОВКИ
        window.adviseChances = function(caseIndex) {
            const casePrice = Number(document.getElementById(`case-price-${caseIndex}`).value);
            const targetTotalProfit = Number(document.getElementById(`target-profit-${caseIndex}`).value); 
            // Целевое матожидание (стоимость приза) = Цена кейса - (Прибыль за 1000 / 1000)
            const targetEV = casePrice - (targetTotalProfit / 1000);

            const items = [];
            let i = 0;
            while(document.getElementById(`name-${caseIndex}-${i}`)) {
                items.push({
                    name: document.getElementById(`name-${caseIndex}-${i}`).value,
                    price: Number(document.getElementById(`price-${caseIndex}-${i}`).value),
                    chance: Number(document.getElementById(`chance-${caseIndex}-${i}`).value) || 1 
                });
                i++;
            }

            if(items.length < 2) {
                showToast('Нужно минимум 2 предмета для балансировки', 'error'); return;
            }

            let minPrice = Math.min(...items.map(it => it.price));
            let maxPrice = Math.max(...items.map(it => it.price));
            const advDiv = document.getElementById(`advice-result-${caseIndex}`);

            if (targetEV < minPrice) {
                advDiv.innerHTML = `<div class="text-red-400 bg-red-900 bg-opacity-20 p-3 rounded text-sm mt-3 border border-red-800"><b>Невозможно!</b> Самый дешевый предмет в кейсе стоит ${minPrice} ЭМ. Вы будете уходить в минус при любых шансах. Добавьте более дешевый лут.</div>`;
                return;
            }
            if (targetEV > maxPrice) {
                advDiv.innerHTML = `<div class="text-red-400 bg-red-900 bg-opacity-20 p-3 rounded text-sm mt-3 border border-red-800"><b>Невозможно!</b> Самый дорогой предмет стоит ${maxPrice} ЭМ. Игрок никогда не сможет окупить кейс до такого уровня.</div>`;
                return;
            }

            // Разделяем предметы на дорогие (убыточные для казино) и дешевые (прибыльные для казино)
            let goodItems = items.filter(it => it.price >= targetEV);
            let badItems = items.filter(it => it.price < targetEV);

            if(goodItems.length === 0 || badItems.length === 0) {
                 advDiv.innerHTML = `<div class="text-yellow-400 text-sm mt-3 p-2 bg-gray-800 rounded">Все предметы стоят одинаково. Настройка шансов не имеет смысла.</div>`;
                 return;
            }

            // Считаем текущий средний вес групп, чтобы не ломать внутреннюю редкость
            let sumGoodChance = goodItems.reduce((s, it) => s + it.chance, 0) || 1;
            let sumBadChance = badItems.reduce((s, it) => s + it.chance, 0) || 1;

            let evGood = goodItems.reduce((s, it) => s + (it.price * it.chance), 0) / sumGoodChance;
            let evBad = badItems.reduce((s, it) => s + (it.price * it.chance), 0) / sumBadChance;

            if (Math.abs(evGood - evBad) < 0.01) {
                 advDiv.innerHTML = `<div class="text-yellow-400 text-sm mt-3 p-2 bg-gray-800 rounded">Разница в ценах слишком мала для балансировки.</div>`;
                 return;
            }

            // Математика баланса весов
            let wGood = 100 * (targetEV - evBad) / (evGood - evBad);
            let wBad = 100 - wGood;

            let newChancesArray = [];
            let htmlList = `<ul class="text-sm space-y-1.5 mb-4 max-h-40 overflow-y-auto custom-scrollbar pr-2">`;

            items.forEach((item, idx) => {
                let newC = 0;
                if (item.price >= targetEV) {
                    newC = (item.chance / sumGoodChance) * wGood;
                } else {
                    newC = (item.chance / sumBadChance) * wBad;
                }
                newC = Math.max(0.001, newC); 
                newChancesArray.push(newC.toFixed(3));
                
                // Визуально подчеркнем изменение
                let diff = newC - item.chance;
                let arrow = diff > 0 ? `<span class="text-green-500 text-xs">▲</span>` : `<span class="text-red-500 text-xs">▼</span>`;
                if(Math.abs(diff) < 0.01) arrow = `<span class="text-gray-500 text-xs">=</span>`;

                htmlList += `<li class="flex justify-between border-b border-gray-700 pb-1">
                    <span class="text-gray-300 truncate pr-2">${item.name}</span>
                    <span class="font-mono text-yellow-400 whitespace-nowrap">${newC.toFixed(3)}% ${arrow}</span>
                </li>`;
            });
            htmlList += `</ul>`;

            advDiv.innerHTML = `
                <div class="mt-4 p-4 bg-gray-800 rounded-lg border border-yellow-600 shadow-inner">
                    <div class="text-xs text-gray-400 mb-3 uppercase tracking-wider font-bold">Идеальные шансы подобраны:</div>
                    ${htmlList}
                    <button onclick="applyAdvice(${caseIndex}, [${newChancesArray}])" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded transition shadow-lg flex justify-center items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Применить новые шансы
                    </button>
                </div>
            `;
        }

        window.applyAdvice = function(caseIndex, chances) {
            chances.forEach((c, i) => {
                let el = document.getElementById(`chance-${caseIndex}-${i}`);
                if(el) {
                    el.value = c;
                    el.classList.add('bg-green-900', 'text-white', 'border-green-500');
                    setTimeout(() => el.classList.remove('bg-green-900', 'text-white', 'border-green-500'), 1500);
                }
            });
            document.getElementById(`advice-result-${caseIndex}`).innerHTML = '';
            showToast('Шансы изменены! Обязательно нажмите "Сохранить кейс".', 'success');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 sm:bottom-8 sm:right-8 px-6 py-4 rounded-lg shadow-2xl text-white font-medium transition-all duration-300 transform translate-y-10 opacity-0 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} z-50`;
            toast.innerText = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
